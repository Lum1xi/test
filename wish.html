(() => {
  const STORAGE_KEY = "standoff2.store.giftRecipient";
  const DEFAULT_AVATAR = "http://melbicom.avatars.cdn.boltgaming.io/x64/_de/_default_1_33";
  const BLANK_AVATAR = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==";
  const recipientCard = document.querySelector(".Jn623Odm.WPQHXlgb");
  const avatar = recipientCard?.querySelector(".VNznsh1o");
  const idLabel = recipientCard?.querySelector("._siTkF0K");
  const nameLabel = recipientCard?.querySelector(".Q6csuHoO");
  const revealRecipientCard = () => {
    if (recipientCard) {
      recipientCard.classList.add("wish-ready");
    }
  };

  if (!recipientCard || !avatar || !idLabel || !nameLabel) {
    revealRecipientCard();
    return;
  }

  const normalizeRecipient = (value) => {
    if (!value || typeof value !== "object") {
      return null;
    }

    const id = String(value.id ?? "").replace(/\s+/g, "").trim();
    const name = String(value.name ?? "").trim();
    const avatarUrl = String(value.avatar ?? "").trim();

    return id && name && avatarUrl ? { id, name, avatar: avatarUrl } : null;
  };

  const recipient = (() => {
    try {
      return normalizeRecipient(JSON.parse(window.localStorage.getItem(STORAGE_KEY) || "null"));
    } catch {
      return null;
    }
  })();

  if (!recipient) {
    return;
  }

  avatar.src = BLANK_AVATAR;
  avatar.alt = "";
  idLabel.textContent = `ID ${recipient.id}`;
  nameLabel.textContent = recipient.name;

  const nextAvatarUrl = recipient.avatar || DEFAULT_AVATAR;
  const nextAvatar = new Image();
  const finalizeRecipientCard = (avatarUrl, altText) => {
    avatar.src = avatarUrl;
    avatar.alt = altText;
    revealRecipientCard();
  };

  nextAvatar.onload = () => {
    finalizeRecipientCard(nextAvatarUrl, `${recipient.name} avatar`);
  };

  nextAvatar.onerror = () => {
    finalizeRecipientCard(BLANK_AVATAR, "");
  };

  nextAvatar.src = nextAvatarUrl;

  if (nextAvatar.complete) {
    if (nextAvatar.naturalWidth > 0) {
      finalizeRecipientCard(nextAvatarUrl, `${recipient.name} avatar`);
    } else {
      finalizeRecipientCard(BLANK_AVATAR, "");
    }
  }
})();
